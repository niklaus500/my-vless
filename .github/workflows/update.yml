name: Update VLESS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          > vless.txt
          for i in $(seq 1 14); do
            curl -L "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Sub${i}.txt" >> vless.txt
            echo "" >> vless.txt
          done

      - name: Keep only VLESS
        run: |
          grep '^vless://' vless.txt | sort -u > clean.txt

      - name: Save
        run: |
          mkdir -p output
          cp clean.txt output/vless.txt

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output/vless.txt
          git commit -m "update" || exit 0
          git push
